<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Ledger</title>
    <link rel="stylesheet" href="./src/styles/style.css" />
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <h1>Expense Ledger</h1>
      <span id="date"></span>
    </header>

    <main class="container">
      <!-- Summary Card -->
      <div class="summary-card">
        <div>
          <p>BALANCE</p>
          <h2 id="balance">₹0.00</h2>
        </div>
        <div class="income_border">
          <p>INCOME</p>
          <h2 id="income">₹0.00</h2>
        </div>
        <div>
          <p>EXPENSES</p>
          <h2 id="expense">₹0.00</h2>
        </div>
      </div>

      <!-- Main Layout -->
      <div class="main">
        <!-- Form -->
        <div class="form-box">
          <div class="list-header">
            <span>New Entry</span>
          </div>

          <div class="type-toggle">
            <button type="button" id="incomeBtn" class="active">
              + Income
            </button>
            <button type="button" id="expenseBtn">- Expense</button>
          </div>

          <form id="form">
            <label for="text">Description</label>
            <input
              type="text"
              id="text"
              placeholder="What was this for?"
              autocomplete="off"
            />

            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" placeholder="0.00" />
            <p id="errorMsg"></p>

            <button type="submit">Record Entry</button>
          </form>
        </div>

        <!-- Transaction List -->
        <div class="list-box">
          <div class="list-header">
            <span>Description</span>
            <span>Amount</span>
          </div>

          <ul id="transactions" class="list"></ul>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <span id="entryCount">0 entries</span>
        <span>data saved locally</span>
      </footer>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
